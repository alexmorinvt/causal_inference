name: grn-inference
channels:
  - conda-forge
dependencies:
  - python=3.11

  # --- Core scientific stack (Stage 0) ---
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - pandas>=2.0

  # --- Dev tools ---
  - pytest>=7.0
  - pytest-cov
  - ruff
  - ipython          # nice-to-have for interactive exploration
  - jupyterlab       # optional; remove if you don't want it

  # --- pip-managed installs ---
  # pip is listed as a conda package first so the pip sub-section works.
  - pip
  - pip:
      # Install this project itself in editable mode so `import grn_inference`
      # works. Run this from inside the repo after `conda env create`.
      - -e .

# -------------------------------------------------------------------------
# Adding Stage 1 (simulation-based model) later:
#
#   conda install -n grn-inference -c pytorch -c conda-forge \
#       pytorch cpuonly
#   conda run -n grn-inference pip install geomloss
#
# When you move to GPU, replace `pytorch cpuonly` with `pytorch pytorch-cuda=12.1`
# and add the `nvidia` channel. The pytorch install selector at
# https://pytorch.org/get-started/locally/ generates the exact command for
# your platform.
#
# Adding CausalBench (real data) later:
#
#   conda run -n grn-inference pip install causalbench
#
# causalbench is PyPI-only, no conda recipe exists — so it goes through pip
# inside the conda env.
# -------------------------------------------------------------------------